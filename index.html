<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crossword Solver</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Crossword Solver</h1>
    
    <main>
        <section class="grid-container">
            <table id="crossword-grid">
                <tbody>
                </tbody>
            </table>
        </section>
        
        <aside class="clues-container">
            <div class="clue-section">
                <h2>Across</h2>
                <ul id="across-clues" class="clue-list">
                </ul>
            </div>
            
            <div class="clue-section">
                <h2>Down</h2>
                <ul id="down-clues" class="clue-list">
                </ul>
            </div>
        </aside>
    </main>
    
    <section class="input-form-container">
        <form id="word-input-form">
            <div class="form-group">
                <label for="clue-number">Clue Number:</label>
                <input type="number" id="clue-number" min="1" max="20" required>
            </div>
            
            <div class="form-group">
                <label for="direction">Direction:</label>
                <select id="direction">
                    <option value="across">Across</option>
                    <option value="down">Down</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="word">Word:</label>
                <input type="text" id="word" maxlength="20" required>
            </div>
            
            <button type="submit">Submit Word</button>
        </form>
        
        <div id="validation-feedback" class="validation-feedback">
        </div>
    </section>
    
    <div id="completion-message" class="completion-message hidden">
        <h2>Puzzle Solved!</h2>
        <p>Congratulations! You've successfully solved the crossword puzzle.</p>
        <button id="reset-puzzle">Start New Puzzle</button>
    </div>
    
    <script src="crossword.js"></script>
    <script src="ui.js"></script>
</body>
</html>
